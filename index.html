<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon of Love | 참여형 사랑의 정의 사전</title>
    <style>
        /* ★ 아날로그 아카이브, 타자기와 붉은 잉크 컨셉 */
        body {
            font-family: 'Pretendard', 'Nanum Myeongjo', 'Apple SD Gothic Neo', serif;
            margin: 0;
            padding: 0;
            background-color: #F7F5F0; /* 건조한 종이 질감의 미색 */
            color: #2C2C2C; /* 먹색 텍스트 */
            line-height: 1.6;
        }

        /* 헤더 (문서의 표지 느낌) */
        header {
            background-color: #F7F5F0;
            padding: 50px 20px 30px;
            text-align: center;
            border-bottom: 1px solid #D9D6D0;
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: #111111;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Times New Roman', Times, serif; /* 영문은 클래식하게 */
        }

        header h1 span {
            color: #C83200; /* 교정용 붉은 잉크 포인트 */
        }

        header p {
            color: #555555;
            font-size: 0.95rem;
            max-width: 600px;
            margin: 15px auto 0;
            word-break: keep-all;
            line-height: 1.8;
        }

        /* 좌우 레이아웃 */
        .container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        @media (min-width: 850px) {
            .container {
                flex-direction: row;
            }
            .left-panel { flex: 1.2; }
            .right-panel { flex: 0.8; }
        }

        /* 패널 공통 (서류철 느낌의 직각 레이아웃) */
        .left-panel, .right-panel {
            background: #FFFFFF;
            padding: 35px;
            border: 1px solid #D9D6D0;
            border-radius: 0;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.03); /* 아주 미세한 그림자 */
        }

        h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #111111;
            border-bottom: 2px solid #C83200; /* 붉은 밑줄 */
            padding-bottom: 10px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ------------------
           좌측: 위키 아카이브 목록
           ------------------ */
        #list-container {
            max-height: 650px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #C83200 #F0EEE9;
            padding-right: 15px;
        }
        #list-container::-webkit-scrollbar { width: 4px; }
        #list-container::-webkit-scrollbar-thumb { background: #C83200; }
        #list-container::-webkit-scrollbar-track { background: #F0EEE9; }
        
        details {
            background: #FFFFFF;
            border-top: 1px solid #EAE8E3;
            border-bottom: 1px solid #EAE8E3;
            margin-bottom: -1px; /* 테두리 겹침 방지 */
            padding: 20px 0;
            transition: background-color 0.2s ease;
            position: relative;
        }
        details:hover {
            background: #FAF9F6;
        }
        
        summary {
            font-weight: 700;
            font-size: 1.2rem;
            color: #111111;
            cursor: pointer;
            list-style: none;
            outline: none;
            word-break: keep-all;
            padding-right: 65px; 
            padding-left: 15px;
            border-left: 3px solid transparent;
            transition: border-color 0.2s;
        }
        
        summary::-webkit-details-marker { display: none; }
        details[open] summary { border-left: 3px solid #C83200; } /* 열렸을 때 붉은 인덱스 */
        
        .content-body {
            margin-top: 20px;
            padding: 20px 15px 0 18px;
            color: #444444; 
            line-height: 1.8;
            font-size: 1rem;
            white-space: pre-wrap;
            text-align: justify;
        }

        /* 삭제 버튼 (교정 부호 느낌) */
        .delete-btn {
            position: absolute;
            top: 20px;
            right: 10px;
            background-color: transparent;
            color: #A09E9A;
            border: 1px solid #D9D6D0;
            padding: 3px 8px;
            border-radius: 0;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .delete-btn:hover { 
            background-color: #C83200; 
            border-color: #C83200;
            color: #FFFFFF;
            text-decoration: line-through; /* 호버 시 취소선 효과 */
        }

        /* ------------------
           우측: 기여하기 폼
           ------------------ */
        .custom-form { display: flex; flex-direction: column; gap: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: #777777; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }

        .custom-form input, .custom-form textarea {
            width: 100%; 
            padding: 15px; 
            background-color: #FAF9F6;
            color: #111111;
            border: 1px solid #D9D6D0;
            border-radius: 0; 
            font-size: 1rem; 
            font-family: inherit;
            box-sizing: border-box; 
            transition: all 0.2s;
        }
        .custom-form input:focus, .custom-form textarea:focus { 
            outline: none; 
            background-color: #FFFFFF;
            border-color: #C83200; 
            box-shadow: -3px 0 0 #C83200; /* 타이핑 중인 줄을 표시하는 듯한 효과 */
        }
        .custom-form textarea { height: 200px; resize: vertical; }

        .submit-btn {
            background-color: #2C2C2C; 
            color: #FFFFFF; 
            border: none;
            padding: 16px; 
            border-radius: 0; 
            font-size: 1rem;
            font-weight: 600; 
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer; 
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .submit-btn:hover { background-color: #C83200; }
        .submit-btn:disabled { background-color: #D9D6D0; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>Lexicon of <span>Love</span></h1>
        <p>기표로서의 '사랑'을 파괴하고, 당신이 발견한 작품 속 서늘한 진실로 빈자리를 채워주세요. 이 위키는 누구나 기록하고 지울 수 있는 백지입니다.</p>
    </header>

    <div class="container">
        <div class="left-panel">
            <h2>Archive DB</h2>
            <div id="list-container"><span style='color:#888;'>데이터베이스 동기화 중...</span></div>
        </div>

        <div class="right-panel">
            <h2>Contribute</h2>
            <form class="custom-form" id="myForm">
                <div class="form-group">
                    <label for="title">Title (작품명)</label>
                    <input type="text" id="title" required placeholder="예: 이터널 선샤인, 사누최">
                </div>
                
                <div class="form-group">
                    <label for="content">Definition (사랑의 정의)</label>
                    <textarea id="content" required placeholder="해당 작품이 말하는 파괴적이고, 혹은 모순적인 사랑의 정의를 서술해주세요."></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="submit-btn">Record</button>
            </form>
        </div>
    </div>

    <script>
        // 사용자님의 Google Apps Script URL
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzd77E3TuZzFoxsN9C5W0ZIYscV3NEsndO-mhel9JZPNap6sS4_O7wDpc9rz8gmcEu-/exec";
        const listContainer = document.getElementById('list-container');
        const myForm = document.getElementById('myForm');
        const submitBtn = document.getElementById('submitBtn');

        // DB에서 위키 데이터 불러오기
        function loadData() {
            listContainer.innerHTML = "<span style='color:#888;'>기록을 불러오는 중입니다...</span>";
            
            fetch(scriptUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        listContainer.innerHTML = "<span style='color:#888;'>등록된 정의가 없습니다. 첫 번째 기록자가 되어주세요.</span>";
                        return;
                    }

                    let html = '';
                    // 최신 글이 위로 오도록 역순 출력
                    for (let i = data.length - 1; i >= 0; i--) {
                        const item = data[i];
                        const safeTitle = String(item.title || "Untitled").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const safeContent = String(item.content || "No content").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        
                        html += `
                            <details>
                                <summary>${safeTitle}</summary>
                                <button class="delete-btn" onclick="deleteData('${item.id}')">Delete</button>
                                <div class="content-body">${safeContent}</div>
                            </details>
                        `;
                    }
                    listContainer.innerHTML = html;
                })
                .catch(error => {
                    listContainer.innerHTML = "<span style='color:#C83200;'>DB 연결에 실패했습니다.</span>";
                    console.error("Error:", error);
                });
        }

        // 위키 데이터 입력 (Insert)
        myForm.addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const titleVal = document.getElementById('title').value;
            const contentVal = document.getElementById('content').value;
            
            submitBtn.innerText = "Recording...";
            submitBtn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('action', 'insert');
            formData.append('title', titleVal);
            formData.append('content', contentVal);

            fetch(scriptUrl, {
                method: 'POST',
                body: formData
            })
            .then(() => {
                myForm.reset(); 
                loadData(); 
            })
            .catch(error => {
                alert("기록 중 오류가 발생했습니다.");
                console.error("Error:", error);
            })
            .finally(() => {
                submitBtn.innerText = "Record";
                submitBtn.disabled = false;
            });
        });

        // 위키 데이터 삭제 (Delete)
        function deleteData(id) {
            if (!confirm("이 정의를 목록에서 영구적으로 삭제하시겠습니까?")) return;

            event.target.innerText = "지우는 중...";
            event.target.disabled = true;

            const formData = new URLSearchParams();
            formData.append('action', 'delete');
            formData.append('id', id);

            fetch(scriptUrl, {
                method: 'POST',
                body: formData
            })
            .then(() => {
                loadData(); 
            })
            .catch(error => {
                alert("삭제 중 오류가 발생했습니다.");
                console.error("Error:", error);
                loadData(); 
            });
        }

        // 초기 데이터 로드
        loadData();
    </script>
</body>
</html>
